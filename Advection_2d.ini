; ----------------------------------------------------------------------
; Linear advection test case — 2D, doubly periodic, constant velocity a
; u_t + a.grad(u) = 0,  u(x,y,0) = sin(2*pi*(x+y)),  a = (1, 1)
; Exact solution: u(x,y,t) = sin(2*pi*(x - a_x*t + y - a_y*t))
; ----------------------------------------------------------------------

[backend-openmp]
cblas = none

[constants]
ax = 1.0
ay = 1.0

[solver]
system = advection
order = 3          ; sweep p = 1..4 same as your Euler vortex study

[solver-time-integrator]
scheme = rk4
controller = none
tstart = 0.0
tend = 20.0
dt = 0.00125

[solver-interfaces-line]
flux-pts = gauss-legendre

[solver-elements-quad]
soln-pts = gauss-legendre

[solver-interfaces]
riemann-solver = central

[soln-ics]
u = sin(2*pi*(x + y)/20)

[soln-plugin-writer]
dt-out = 5.0
basedir = .
basename = advec-20-central-ord3-{t:.2f}

; Reuse your existing soln-plugin-integrate + fmod periodic-wrap approach
; here, just swap in the linear advection exact solution:
;   u_exact(x,y,t) = sin(2*pi*(fmod(x - ax*t, 1) + fmod(y - ay*t, 1)))

[soln-plugin-integrate]
nsteps = 50
file = advec-errors-20-central-ord3.csv
header = true
quad-deg = 6
int-u = (u - sin(2*pi*((x - ax*t) + (y - ay*t))/20))*(u - sin(2*pi*((x - ax*t) + (y - ay*t))/20))

